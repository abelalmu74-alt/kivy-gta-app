name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev lldb lld openjdk-17-jdk shared-mime-info Autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev
        pip install --upgrade pip
        pip install buildozer cython

    - name: Build Android APK with Buildozer
      run: |
        yes | buildozer android debug
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-APK
        path: bin/*.apk
